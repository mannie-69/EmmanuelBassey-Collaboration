<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <style>

        body{
            background-color: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
        }

        section{
            width: 60%;
            margin: auto;
            background-color: white;
            padding: 25px;
            margin-top: 50px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        img{
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1{
            color: darkblue;
        }

        p{
            font-size: 18px;
            line-height: 30px;
            color: #333;
        }

        span{
            color: darkred;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <section>

        <img src="myphoto.jpg" alt="My Picture">

        <h1>ABOUT ME</h1>

        <p>
            My name is <span>Emmanuel Bassey</span>.
        </p>

        <p>
            I am a student of <span>Topfaith University</span>.
        </p>

        <p>
            I study <span>Computer Engineering</span>.
        </p>

        <p>
            I am passionate about technology and programming.
        </p>

    </section>

</body>
</html>
